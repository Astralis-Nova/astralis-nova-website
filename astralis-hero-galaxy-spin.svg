<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Astralis Nova spiral galaxy</title>
  <desc id="desc">A realistic luminous spiral galaxy with dust lanes, stellar arms, and a bright central bulge.</desc>
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fff8dd" stop-opacity=".76"/>
      <stop offset=".14" stop-color="#ffd7ad" stop-opacity=".56"/>
      <stop offset=".34" stop-color="#e19aff" stop-opacity=".34"/>
      <stop offset=".62" stop-color="#6da9ff" stop-opacity=".15"/>
      <stop offset="1" stop-color="#171039" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bulge" cx="47%" cy="43%" r="62%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".15" stop-color="#fffbe2"/>
      <stop offset=".38" stop-color="#ffd7a5"/>
      <stop offset=".7" stop-color="#ff9fcb" stop-opacity=".76"/>
      <stop offset="1" stop-color="#8c7dff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#66dcff" stop-opacity=".04"/>
      <stop offset=".34" stop-color="#9d9cff" stop-opacity=".48"/>
      <stop offset=".67" stop-color="#ff9bc9" stop-opacity=".64"/>
      <stop offset="1" stop-color="#fff0be" stop-opacity=".06"/>
    </linearGradient>
    <linearGradient id="cool" x1="1" y1="0" x2="0" y2="1">
      <stop stop-color="#fff0bd" stop-opacity=".04"/>
      <stop offset=".3" stop-color="#f5a0d2" stop-opacity=".44"/>
      <stop offset=".66" stop-color="#788cff" stop-opacity=".58"/>
      <stop offset="1" stop-color="#61d9ff" stop-opacity=".05"/>
    </linearGradient>
    <filter id="blur5" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="blur13" x="-35%" y="-35%" width="170%" height="170%"><feGaussianBlur stdDeviation="13"/></filter>
    <filter id="blur28" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="28"/></filter>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="texture" x="-12%" y="-12%" width="124%" height="124%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency=".012 .034" numOctaves="3" seed="17" result="n"/>
      <feColorMatrix in="n" values="1 0 0 0 .18  0 .65 0 0 .08  0 0 .9 0 .18  0 0 0 .34 0" result="c"/>
      <feBlend in="SourceGraphic" in2="c" mode="screen" result="t"/>
      <feComposite in="t" in2="SourceAlpha" operator="in"/>
    </filter>
    <filter id="stars" x="-8%" y="-8%" width="116%" height="116%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency=".105" numOctaves="2" seed="31" result="noise"/>
      <feComponentTransfer in="noise" result="points">
        <feFuncR type="discrete" tableValues="0 0 0 0 0 0 0 0 1"/>
        <feFuncG type="discrete" tableValues="0 0 0 0 0 0 0 0 1"/>
        <feFuncB type="discrete" tableValues="0 0 0 0 0 0 0 0 1"/>
        <feFuncA type="table" tableValues="0 .1 .3 .9"/>
      </feComponentTransfer>
      <feColorMatrix in="points" values="0 0 0 0 .9  0 0 0 0 .95  0 0 0 0 1  0 0 0 .9 0" result="whitePoints"/>
      <feComposite in="whitePoints" in2="SourceAlpha" operator="in"/>
    </filter>
    <clipPath id="disk"><ellipse rx="382" ry="292"/></clipPath>
  </defs>

  <g transform="translate(450 450) rotate(-17)">
    <ellipse rx="382" ry="294" fill="url(#halo)" opacity=".76" filter="url(#blur28)"/>
    <ellipse rx="330" ry="138" fill="url(#halo)" opacity=".42" filter="url(#blur13)"/>

    <g opacity=".97" filter="url(#texture)">
      <path d="M-378-86C-286-208-111-257 62-216c142 34 260 123 350 251-131-72-257-101-380-91-134 12-251 71-410 168 62-77 126-128 205-167 92-45 183-64 280-62-132-25-256-7-485 71Z" fill="url(#warm)"/>
      <path d="M-354 139C-246 23-94-43 73-47c149-3 287 48 397 148-145-49-277-49-397-9-132 45-228 130-360 274 34-92 83-160 150-218 80-69 167-109 264-132-136 9-253 58-481 123Z" fill="url(#cool)"/>
      <path d="M38-389C174-304 269-186 311-54c38 121 28 255-31 394-8-146-51-266-129-360-89-107-206-164-375-234 97 5 176 28 252 70 90 51 160 113 216 192-49-121-128-223-206-397Z" fill="url(#warm)" opacity=".76"/>
      <path d="M-44 394C-177 315-274 207-325 75c-46-119-51-254-9-396 29 143 83 257 169 343 96 96 219 143 391 200-97 1-178-17-256-55-92-44-166-102-227-176 63 114 147 211 213 385Z" fill="url(#cool)" opacity=".74"/>
    </g>

    <g fill="none" stroke-linecap="round" filter="url(#blur5)">
      <path d="M-360-67C-235-176-86-210 81-165c141 38 247 118 335 236" stroke="#c4a7ff" stroke-opacity=".35" stroke-width="17" stroke-dasharray="2 18"/>
      <path d="M-333 132C-205 23-54-19 101 10c135 25 248 95 340 200" stroke="#ffacd2" stroke-opacity=".31" stroke-width="15" stroke-dasharray="2 16"/>
      <path d="M21-356C132-272 209-154 232-25c21 118-3 236-80 356" stroke="#79dcff" stroke-opacity=".29" stroke-width="14" stroke-dasharray="2 18"/>
      <path d="M-17 360C-129 274-207 160-233 36c-24-116-3-236 71-358" stroke="#a69aff" stroke-opacity=".27" stroke-width="13" stroke-dasharray="2 17"/>
    </g>

    <g fill="none" stroke="#100924" stroke-linecap="round" filter="url(#blur13)">
      <path d="M-335-40C-207-122-74-145 69-111c121 29 218 91 298 185" stroke-opacity=".5" stroke-width="20"/>
      <path d="M-298 157C-174 68-49 40 82 62c112 19 206 70 283 149" stroke-opacity=".44" stroke-width="18"/>
      <path d="M50-307C134-229 185-137 197-39c11 90-10 182-69 276" stroke-opacity=".4" stroke-width="16"/>
      <path d="M-56 309C-140 233-194 139-209 41c-14-91 4-183 59-278" stroke-opacity=".38" stroke-width="15"/>
    </g>

    <ellipse rx="366" ry="278" fill="#fff" opacity=".42" filter="url(#stars)" clip-path="url(#disk)"/>

    <ellipse rx="200" ry="88" fill="url(#bulge)" opacity=".86" filter="url(#blur28)"/>
    <ellipse rx="121" ry="50" fill="url(#bulge)" opacity=".98" filter="url(#blur13)"/>
    <ellipse rx="44" ry="22" fill="#fffdf2" opacity=".99" filter="url(#glow)"/>

    <g fill="#fff" filter="url(#glow)">
      <circle cx="-302" cy="-83" r="3.6" opacity=".88"/><circle cx="310" cy="72" r="3.2" opacity=".84"/>
      <circle cx="104" cy="-304" r="3.4" opacity=".9"/><circle cx="-135" cy="289" r="3.7" opacity=".82"/>
      <circle cx="-337" cy="51" r="2.8" opacity=".76"/><circle cx="284" cy="-102" r="3" opacity=".8"/>
      <circle cx="184" cy="252" r="2.8" opacity=".76"/><circle cx="-91" cy="-326" r="3.5" opacity=".86"/>
      <circle cx="348" cy="-8" r="2.5" opacity=".72"/><circle cx="-249" cy="211" r="2.7" opacity=".7"/>
      <circle cx="63" cy="337" r="2.5" opacity=".72"/><circle cx="-11" cy="-365" r="2.4" opacity=".74"/>
    </g>
  </g>
</svg>