<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Astralis Nova animated star</title>
  <desc id="desc">A luminous four-point star with a small planet orbiting it.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0" stop-color="#101b58"/>
      <stop offset=".58" stop-color="#070c31"/>
      <stop offset="1" stop-color="#020515"/>
    </radialGradient>
    <linearGradient id="orbit" x1="8" y1="12" x2="56" y2="54">
      <stop stop-color="#7b8cff"/>
      <stop offset=".48" stop-color="#43e6ff"/>
      <stop offset="1" stop-color="#ff62db"/>
    </linearGradient>
    <linearGradient id="star" x1="32" y1="10" x2="32" y2="55">
      <stop stop-color="#a7f7ff"/>
      <stop offset=".48" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f09bff"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" width="62" height="62" rx="15" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="23" fill="none" stroke="url(#orbit)" stroke-width="2.4" opacity=".9"/>
  <g filter="url(#glow)">
    <path d="M32 8c2.8 14.4 4.6 18.2 18.6 24C36.6 37.8 34.8 41.6 32 56c-2.8-14.4-4.6-18.2-18.6-24C27.4 26.2 29.2 22.4 32 8Z" fill="url(#star)"/>
    <circle cx="32" cy="32" r="3.2" fill="#fff"/>
  </g>
  <g>
    <circle cx="55" cy="32" r="4.2" fill="#d9ffff" filter="url(#glow)"/>
    <circle cx="55" cy="32" r="2.1" fill="#71eeff"/>
    <animateTransform attributeName="transform" type="rotate" from="0 32 32" to="360 32 32" dur="4.8s" repeatCount="indefinite"/>
  </g>
</svg>
