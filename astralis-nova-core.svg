<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Astralis Nova AI Core</title>
  <desc id="desc">A luminous star core with orbital rings and neural light nodes.</desc>
  <defs>
    <radialGradient id="core" cx="38%" cy="32%" r="72%">
      <stop offset="0" stop-color="#fffde9"/>
      <stop offset=".12" stop-color="#fff1a8"/>
      <stop offset=".34" stop-color="#ffb33f"/>
      <stop offset=".58" stop-color="#ff4d75"/>
      <stop offset=".78" stop-color="#8e36d8"/>
      <stop offset="1" stop-color="#17155d"/>
    </radialGradient>
    <radialGradient id="halo">
      <stop offset="0" stop-color="#fff4a0" stop-opacity=".72"/>
      <stop offset=".3" stop-color="#ff6e9e" stop-opacity=".36"/>
      <stop offset=".66" stop-color="#7567ff" stop-opacity=".18"/>
      <stop offset="1" stop-color="#56d7ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" x2="1">
      <stop stop-color="#53d5ff" stop-opacity="0"/>
      <stop offset=".2" stop-color="#95efff" stop-opacity=".9"/>
      <stop offset=".5" stop-color="#fff4a7"/>
      <stop offset=".8" stop-color="#f25bd5" stop-opacity=".9"/>
      <stop offset="1" stop-color="#5b6dff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="texture" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency=".018 .042" numOctaves="3" seed="22" result="noise"/>
      <feColorMatrix in="noise" values="1 0 0 0 .15  0 .4 0 0 .05  0 0 .3 0 .1  0 0 0 .42 0" result="colored"/>
      <feBlend in="SourceGraphic" in2="colored" mode="screen"/>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="232" fill="url(#halo)" filter="url(#soft)"/>
  <ellipse cx="256" cy="256" rx="220" ry="88" fill="none" stroke="url(#ring)" stroke-width="5" opacity=".82" transform="rotate(-14 256 256)"/>
  <ellipse cx="256" cy="256" rx="188" ry="62" fill="none" stroke="url(#ring)" stroke-width="2.5" opacity=".52" transform="rotate(28 256 256)"/>
  <ellipse cx="256" cy="256" rx="148" ry="42" fill="none" stroke="#a8e9ff" stroke-opacity=".32" stroke-width="2" transform="rotate(74 256 256)"/>

  <circle cx="256" cy="256" r="138" fill="#ff6f66" opacity=".22" filter="url(#soft)"/>
  <circle cx="256" cy="256" r="112" fill="url(#core)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="108" fill="url(#core)" filter="url(#texture)"/>
  <ellipse cx="225" cy="210" rx="40" ry="24" fill="#fff" opacity=".22" transform="rotate(-28 225 210)"/>
  <path d="M172 272c42-25 77-8 115-29 31-17 57-16 86 4" fill="none" stroke="#fff6bd" stroke-opacity=".45" stroke-width="7" stroke-linecap="round"/>
  <path d="M190 316c36-16 67-8 100-24 26-12 48-11 72 3" fill="none" stroke="#8bdcff" stroke-opacity=".32" stroke-width="5" stroke-linecap="round"/>

  <g fill="#e9fbff" filter="url(#glow)">
    <circle cx="74" cy="220" r="6"/><circle cx="124" cy="111" r="5"/><circle cx="240" cy="52" r="7"/>
    <circle cx="391" cy="91" r="6"/><circle cx="446" cy="233" r="7"/><circle cx="391" cy="398" r="5"/>
    <circle cx="226" cy="457" r="6"/><circle cx="89" cy="352" r="5"/>
  </g>
  <g stroke="#8beaff" stroke-opacity=".42" stroke-width="2">
    <path d="M74 220L154 238M124 111l73 83M240 52l12 91M391 91l-67 89M446 233l-87 14M391 398l-76-71M226 457l12-88M89 352l79-52"/>
  </g>
  <g fill="#fff7b0">
    <circle cx="154" cy="238" r="3.5"/><circle cx="197" cy="194" r="3.5"/><circle cx="252" cy="143" r="3.5"/>
    <circle cx="324" cy="180" r="3.5"/><circle cx="359" cy="247" r="3.5"/><circle cx="315" cy="327" r="3.5"/>
    <circle cx="238" cy="369" r="3.5"/><circle cx="168" cy="300" r="3.5"/>
  </g>
</svg>