<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Astralis Nova AI Visitor</title>
  <desc id="desc">A friendly luminous alien with cybernetic details and star reflections.</desc>
  <defs>
    <radialGradient id="skin" cx="38%" cy="28%" r="75%">
      <stop offset="0" stop-color="#d8ffdd"/>
      <stop offset=".2" stop-color="#78f4a8"/>
      <stop offset=".55" stop-color="#2eb47a"/>
      <stop offset=".82" stop-color="#0a694f"/>
      <stop offset="1" stop-color="#04362f"/>
    </radialGradient>
    <radialGradient id="eye" cx="34%" cy="28%" r="80%">
      <stop offset="0" stop-color="#ecffff"/>
      <stop offset=".1" stop-color="#8cf7ff"/>
      <stop offset=".24" stop-color="#1d89b8"/>
      <stop offset=".48" stop-color="#082644"/>
      <stop offset="1" stop-color="#01040b"/>
    </radialGradient>
    <linearGradient id="circuit" x1="0" x2="1">
      <stop stop-color="#a5fff1"/><stop offset=".5" stop-color="#4ce2ff"/><stop offset="1" stop-color="#be72ff"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>

  <ellipse cx="256" cy="266" rx="196" ry="196" fill="#51ffb5" opacity=".12" filter="url(#soft)"/>
  <ellipse cx="256" cy="254" rx="170" ry="208" fill="url(#skin)" stroke="#a7ffd2" stroke-opacity=".32" stroke-width="4"/>
  <path d="M104 234C119 91 185 42 256 42s137 49 152 192c9 90-42 203-152 233C146 437 95 324 104 234Z" fill="url(#skin)"/>

  <ellipse cx="181" cy="235" rx="62" ry="88" fill="url(#eye)" transform="rotate(18 181 235)" stroke="#8ef7ff" stroke-opacity=".46" stroke-width="4"/>
  <ellipse cx="331" cy="235" rx="62" ry="88" fill="url(#eye)" transform="rotate(-18 331 235)" stroke="#8ef7ff" stroke-opacity=".46" stroke-width="4"/>
  <ellipse cx="162" cy="202" rx="18" ry="12" fill="#fff" opacity=".9" transform="rotate(18 162 202)"/>
  <ellipse cx="312" cy="202" rx="18" ry="12" fill="#fff" opacity=".9" transform="rotate(-18 312 202)"/>
  <circle cx="202" cy="270" r="7" fill="#d8ffff" filter="url(#glow)"/>
  <circle cx="310" cy="270" r="7" fill="#d8ffff" filter="url(#glow)"/>

  <path d="M204 365c33 20 71 20 104 0" fill="none" stroke="#073e33" stroke-width="8" stroke-linecap="round" opacity=".8"/>
  <path d="M226 382c20 8 40 8 60 0" fill="none" stroke="#c8ffe0" stroke-opacity=".4" stroke-width="3" stroke-linecap="round"/>

  <g fill="none" stroke="url(#circuit)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity=".84" filter="url(#glow)">
    <path d="M112 291h30l18 22h20"/>
    <path d="M400 291h-30l-18 22h-20"/>
    <path d="M147 112l28 25v29"/>
    <path d="M365 112l-28 25v29"/>
  </g>
  <g fill="#d8ffff" filter="url(#glow)">
    <circle cx="112" cy="291" r="7"/><circle cx="180" cy="313" r="6"/><circle cx="400" cy="291" r="7"/><circle cx="332" cy="313" r="6"/>
    <circle cx="147" cy="112" r="7"/><circle cx="175" cy="166" r="6"/><circle cx="365" cy="112" r="7"/><circle cx="337" cy="166" r="6"/>
  </g>
  <path d="M256 46v-20" stroke="#8fffe6" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="256" cy="21" r="8" fill="#c9ffff" filter="url(#glow)"/>
  <path d="M238 96h36" stroke="#d7fff1" stroke-opacity=".4" stroke-width="4" stroke-linecap="round"/>
</svg>